<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goal Detail</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; font-size: 16px; color: #111; background: #fff; padding-bottom: 64px; }

    header { padding: 16px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
    header span { font-size: 18px; font-weight: 600; }
    header a { font-size: 14px; color: #555; text-decoration: none; }

    main { padding: 16px; }

    .goal-header { padding: 20px 0 24px; border-bottom: 1px solid #ddd; margin-bottom: 24px; }
    .goal-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .goal-header .due { font-size: 14px; color: #777; }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .stat { border: 1px solid #ddd; border-radius: 6px; padding: 16px; }
    .stat p { font-size: 13px; color: #777; margin-bottom: 4px; }
    .stat .val { font-size: 24px; font-weight: 700; }

    h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: #666; margin-bottom: 10px; }
    progress { width: 100%; height: 12px; accent-color: #111; border-radius: 6px; }
    .progress-labels { display: flex; justify-content: space-between; font-size: 13px; color: #777; margin-top: 6px; }
    .pct { font-size: 36px; font-weight: 700; margin-top: 16px; }
    .remaining { font-size: 15px; color: #555; margin-top: 4px; }

    nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #fff; border-top: 1px solid #ccc; }
    nav a { flex: 1; text-align: center; padding: 14px 0; font-size: 13px; color: #555; text-decoration: none; min-height: 44px; }
    nav a.active { font-weight: 700; color: #111; }
  </style>
</head>
<body>

<header>
  <a href="05-goals.html">← Goals</a>
  <span>Goal</span>
  <span></span>
</header>

<main>
  <div class="goal-header">
    <h1>Emergency Fund</h1>
    <div class="due">Target date: Dec 31, 2026</div>
  </div>

  <div class="stats">
    <div class="stat"><p>Saved so far</p><div class="val">$3,200</div></div>
    <div class="stat"><p>Target amount</p><div class="val">$5,000</div></div>
  </div>

  <h2>Progress</h2>
  <progress value="3200" max="5000"></progress>
  <div class="progress-labels"><span>$0</span><span>$5,000</span></div>
  <div class="pct">64%</div>
  <div class="remaining">$1,800 remaining</div>
</main>

<nav>
  <a href="01-home.html">Home</a>
  <a href="02-accounts.html">Accounts</a>
  <a href="04-transactions.html">Transactions</a>
  <a href="05-goals.html" class="active">Goals</a>
</nav>

</body>
</html>
