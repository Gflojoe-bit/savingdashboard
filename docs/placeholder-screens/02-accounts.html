<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; font-size: 16px; color: #111; background: #fff; padding-bottom: 64px; }

    header { padding: 16px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
    header span { font-size: 18px; font-weight: 600; }
    header a { font-size: 14px; color: #555; text-decoration: none; }

    main { padding: 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 20px; }

    ul { list-style: none; }
    ul li { border-bottom: 1px solid #eee; }
    ul li:last-child { border-bottom: none; }
    ul li a { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; min-height: 44px; text-decoration: none; color: #111; }

    .acct-name { font-size: 15px; font-weight: 500; }
    .acct-type { font-size: 13px; color: #777; margin-top: 2px; }
    .acct-balance { font-size: 15px; font-weight: 600; }

    nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #fff; border-top: 1px solid #ccc; }
    nav a { flex: 1; text-align: center; padding: 14px 0; font-size: 13px; color: #555; text-decoration: none; min-height: 44px; }
    nav a.active { font-weight: 700; color: #111; }
  </style>
</head>
<body>

<header>
  <a href="01-home.html">← Home</a>
  <span>Accounts</span>
  <span></span>
</header>

<main>

  <ul>
    <li>
      <a href="03-account-detail.html">
        <div>
          <div class="acct-name">Checking (Bank A)</div>
          <div class="acct-type">Checking</div>

        <span class="acct-balance">$3,200.00 ›</span>
      </a>
    </li>
    <li>
      <a href="03-account-detail.html">
        <div>
          <div class="acct-name">Savings (Bank B)</div>
          <div class="acct-type">Savings</div>

        <span class="acct-balance">$9,200.00 ›</span>
      </a>
    </li>
  </ul>
</main>

<nav>
